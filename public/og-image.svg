  <rect x="960" y="300" width="50" height="50" fill="rgba(110,72,240,0.08)" stroke="rgba(110,72,240,0.22)" stroke-width="1"/>
  <rect x="1020" y="300" width="50" height="50" fill="none" stroke="rgba(110,72,240,0.18)" stroke-width="1"/>
  <rect x="1080" y="300" width="50" height="50" fill="none" stroke="rgba(110,72,240,0.18)" stroke-width="1"/>
  <rect x="960" y="360" width="50" height="50" fill="rgba(0,200,150,0.08)" stroke="rgba(0,200,150,0.25)" stroke-width="1"/>
